services:
  - type: web
    name: daystar
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn daystar.wsgi:application"
    envVars:
      - key: DATABASE_URL
        sync: false  # Set this manually from your existing Render PostgreSQL database
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3"
