databases:
  - name: daystar-db
    plan: free
    databaseName: daystar_db

services:
  - type: web
    name: daystar
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn daystar.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: daystar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3"
